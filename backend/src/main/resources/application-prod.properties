# Production Properties
# IMPORTANT: Railway/Heroku DATABASE_URL often starts with "postgres://"
# Spring Boot requires "jdbc:postgresql://"
# You can fix this in Railway by setting: 
# SPRING_DATASOURCE_URL = jdbc:${{Postgres.DATABASE_URL}}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/placeholder}
spring.datasource.jdbc-url=${DATABASE_URL:jdbc:postgresql://localhost:5432/placeholder}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:Postgresql}
spring.jpa.show-sql=false

# CORS Configuration for production
cors.allowed.origins=https://examdesk.netlify.app

